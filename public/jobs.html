<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İş Listeleri - Şirket Portalı</title>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        async function checkAuth() {
            const cachedUser = localStorage.getItem('user_cache');
            if (cachedUser) {
                try {
                    const user = JSON.parse(cachedUser);
                    updateUserInterface(user);
                } catch (e) { console.error(e); }
            }

            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) {
                    localStorage.removeItem('user_cache');
                    window.location.href = '/index.html';
                    return null;
                }
                const user = await response.json();
                localStorage.setItem('user_cache', JSON.stringify(user));
                updateUserInterface(user);
                return user;
            } catch (error) {
                if (!cachedUser) window.location.href = '/index.html';
            }
        }

        function updateUserInterface(user) {
            document.getElementById('userName').textContent = user.full_name;
            document.getElementById('userRole').textContent = user.role === 'admin' ? '👑 Yönetici' : '👤 Personel';
            if (user.role === 'admin') {
                document.getElementById('adminLink').style.display = 'block';
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/index.html';
        }

        async function loadJobs() {
            const response = await fetch('/api/jobs');
            const jobs = await response.json();
            const container = document.getElementById('jobsContainer');

            if (jobs.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">Henüz iş listesi yok</p>';
                return;
            }

            const statusColors = { pending: 'warning', processing: 'primary', completed: 'success' };
            const statusLabels = { pending: 'Bekliyor', processing: 'İşlemde', completed: 'Tamamlandı' };

            container.innerHTML = jobs.map(job => {
                const viewersText = job.recent_viewers && job.recent_viewers.length > 0
                    ? job.recent_viewers.map(v => v.full_name).join(', ')
                    : 'Henüz kimse bakmadı';

                return `
        <div class="card">
          <div class="card-header">
            <div>
              <strong>${job.title}</strong>
              <div class="text-sm text-muted">${job.creator.full_name} - ${new Date(job.created_at).toLocaleDateString('tr-TR')}</div>
            </div>
            <span class="badge badge-${statusColors[job.status]}">${statusLabels[job.status]}</span>
          </div>
          <div class="card-body" style="padding: 12px 20px;">
            <div style="margin-bottom: 8px;">
              <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px;">
                <span><strong>Tamamlanma:</strong></span>
                <span><strong>%${job.completion_percentage || 0}</strong></span>
              </div>
              <div style="background: #e5e7eb; height: 6px; border-radius: 3px; overflow: hidden;">
                <div style="background: #059669; height: 100%; width: ${job.completion_percentage || 0}%; transition: width 0.3s;"></div>
              </div>
            </div>
            <div style="font-size: 0.8rem; color: #6b7280;">
              <span>👁️ ${viewersText}</span>
            </div>
          </div>
          <div class="card-footer">
            <a href="/job-detail.html?id=${job.id}&title=${encodeURIComponent(job.title)}" class="btn btn-primary btn-sm">Detay Gör</a>
          </div>
        </div>
      `;
            }).join('');
        }

        function createNewJob() {
            document.getElementById('createJobForm').reset();
            const modal = document.getElementById('createJobModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeJobModal() {
            const modal = document.getElementById('createJobModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadJobs();

            document.getElementById('createJobForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('jobTitle').value;

                try {
                    const response = await fetch('/api/jobs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title })
                    });

                    if (response.ok) {
                        const job = await response.json();
                        window.location.href = `/job-detail.html?id=${job.id}&title=${encodeURIComponent(job.title)}`;
                    } else {
                        showAlert('Hata oluştu');
                    }
                } catch (error) {
                    console.error(error);
                }
            });
        });
    </script>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                Şirket Portalı
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/dashboard.html" class="nav-link">
                        <span class="nav-icon">📊</span>
                        Ana Sayfa
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/jobs.html" class="nav-link active">
                        <span class="nav-icon">📋</span>
                        İş Listeleri
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/sources.html" class="nav-link">
                        <span class="nav-icon">📦</span>
                        Kaynaklar
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/products.html" class="nav-link">
                        <span class="nav-icon">🔧</span>
                        Ürünler
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/attendance.html" class="nav-link">
                        <span class="nav-icon">📅</span>
                        Çalışma Kaydı
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/salary.html" class="nav-link">
                        <span class="nav-icon">💰</span>
                        Maaş Yönetimi
                    </a>
                </li>

                <li class="nav-item" id="adminLink">
                    <a href="/admin.html" class="nav-link">
                        <span class="nav-icon">⚙️</span>
                        Yönetim
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Sistem Yöneticisi</div>
                        <div class="user-role" id="userRole">Yönetici</div>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
            </div>
        </aside>
        <main class="main-content">
            <button id="sidebarToggle" class="btn-icon mobile-only">☰</button>
            <div class="page-header">
                <h1 class="page-title">İş Listeleri</h1>
                <button class="btn btn-primary" onclick="createNewJob()">+ Yeni Liste Oluştur</button>
            </div>
            <div id="jobsContainer">
                <div class="loader"></div>
            </div>
        </main>
    </div>

    <script src="/js/utils.js?v=1.0"></script>
    <!-- CREATE JOB MODAL -->
    <div id="createJobModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">📋 Yeni İş Listesi</h2>
                <button class="modal-close" onclick="closeJobModal()">×</button>
            </div>
            <form id="createJobForm">
                <div class="form-group">
                    <label class="form-label">Liste Başlığı</label>
                    <input type="text" id="jobTitle" class="form-input" required
                        placeholder="Örn: Beylikdüzü Şantiyesi">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeJobModal()">İptal</button>
                    <button type="submit" class="btn btn-primary">Oluştur</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
