<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ana Sayfa - Şirket Portalı</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                Şirket Portalı
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/dashboard.html" class="nav-link active">
                        <span class="nav-icon">📊</span>
                        Ana Sayfa
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/jobs.html" class="nav-link">
                        <span class="nav-icon">📋</span>
                        İş Listeleri
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/sources.html" class="nav-link">
                        <span class="nav-icon">📦</span>
                        Kaynaklar
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/products.html" class="nav-link">
                        <span class="nav-icon">🔧</span>
                        Ürünler
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/attendance.html" class="nav-link">
                        <span class="nav-icon">📅</span>
                        Çalışma Kaydı
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/salary.html" class="nav-link">
                        <span class="nav-icon">💰</span>
                        Maaş Yönetimi
                    </a>
                </li>

                <li class="nav-item" id="adminLink">
                    <a href="/admin.html" class="nav-link">
                        <span class="nav-icon">⚙️</span>
                        Yönetim
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Sistem Yöneticisi</div>
                        <div class="user-role" id="userRole">Yönetici</div>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <button id="sidebarToggle" class="btn-icon mobile-only">☰</button>
            <div class="page-header">
                <h1 class="page-title">Hoş Geldiniz! 👋</h1>
            </div>

            <!-- İstatistikler -->
            <div class="grid grid-3 mb-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #dbeafe; color: #1e40af;">📋</div>
                    <div class="stat-value" id="totalJobs">0</div>
                    <div class="stat-label">Toplam İş Listesi</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: #d1fae5; color: #065f46;">✓</div>
                    <div class="stat-value" id="completedJobs">0</div>
                    <div class="stat-label">Tamamlanan</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: #fef3c7; color: #92400e;">⏳</div>
                    <div class="stat-value" id="pendingJobs">0</div>
                    <div class="stat-label">Bekleyen</div>
                </div>
            </div>

            <!-- Son İş Listeleri -->
            <div class="card">
                <div class="card-header">
                    <span>Son İş Listeleri</span>
                    <a href="/jobs.html" class="btn btn-primary btn-sm">Tümünü Gör</a>
                </div>
                <div class="card-body">
                    <div id="recentJobs">
                        <div class="loader"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/utils.js?v=2.0"></script>
    <script src="/js/dashboard.js?v=2.0"></script>
</body>

</html>
